<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Menu</title>
  <link rel="stylesheet" href="/client/style.css?v=4" />
</head>
<body>

  <!-- ── Menu ── -->
  <div id="menu-screen" class="screen active">
    <div class="menu-hero">
      <div class="hero-top">
        <div class="hero-brand">
          <div class="brand-icon-wrap">
            <img id="brand-logo" class="brand-logo hidden" alt="Restaurant logo" />
            <div class="brand-icon">🍽️</div>
          </div>
          <div>
            <p id="brand-name" class="brand-name">Restaurant</p>
            <h1 id="table-title">Our Menu</h1>
            <p id="table-subtitle" class="hero-sub"></p>
          </div>
        </div>
        <button id="cart-btn" class="cart-fab" onclick="showCart()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          <span id="cart-count" class="cart-badge hidden">0</span>
        </button>
      </div>
      <div id="cat-tabs" class="cat-tabs"></div>
    </div>
    <div id="menu-list" class="menu-list"></div>
  </div>

  <!-- ── Cart ── -->
  <div id="cart-screen" class="screen">
    <div class="page-header">
      <button onclick="showMenu()" class="btn-back">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
      <h2 class="page-title">Your Order</h2>
      <div style="width:40px"></div>
    </div>
    <div id="cart-list" class="cart-list"></div>
    <div id="cart-footer" class="cart-footer">
      <div id="cart-total" class="cart-total-row"></div>
      <div class="name-field">
        <label class="name-label">Your name <span class="opt">(optional)</span></label>
        <input id="customer-name" type="text" placeholder="e.g. Alex" maxlength="30" class="name-input" />
      </div>
      <button id="order-btn" onclick="placeOrder()" class="btn-primary">Confirm Order</button>
    </div>
  </div>

  <!-- ── Status ── -->
  <div id="status-screen" class="screen">
    <div class="status-page">
      <div class="status-glow"></div>
      <div id="status-icon" class="status-emoji">🧑‍🍳</div>
      <h2 id="status-title">Order Confirmed!</h2>
      <p id="status-msg">Our kitchen is working on your order.</p>
      <div id="status-items" class="status-items"></div>
      <button onclick="backToMenu()" class="btn-ghost">Order More</button>
    </div>
  </div>

  <script src="/client/app.js?v=4"></script>
</body>
</html>
